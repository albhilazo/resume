name: generate-pdf

on:
  push:
    paths:
      - 'index.html'
      - 'resume.css'
      - 'assets/**'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  generate-pdf:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: lts/*
          cache: npm

      - name: Install dependencies
        run: npm clean-install

      - name: Generate PDF
        run: npm run pdf
        env:
          PUPPETEER_EXECUTABLE_PATH: /usr/bin/google-chrome-stable

      - name: Commit PDF
        run: |
          git config user.name '${{ vars.GIT_NAME }}'
          git config user.email '${{ vars.GIT_EMAIL }}'
          git add Albert-Hilazo-Aguilera-resume.pdf
          git diff --staged --quiet || git commit -m "Automated PDF update"
          git push
