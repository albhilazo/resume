name: generate-pdf

on:
  push:
    paths:
      - 'index.html'
      - 'resume.css'
      - 'assets/**'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  generate-pdf:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Check if PDF was already updated in this commit
        id: pdf-check
        run: |
          if git diff --name-only HEAD~1 HEAD | grep -q 'Albert-Hilazo-Aguilera-resume.pdf'; then
            echo "skip=true" >> "$GITHUB_OUTPUT"
          else
            echo "skip=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Setup Node.js
        if: steps.pdf-check.outputs.skip == 'false'
        uses: actions/setup-node@v4
        with:
          node-version: lts/*
          cache: npm

      - name: Install dependencies
        if: steps.pdf-check.outputs.skip == 'false'
        run: npm clean-install

      - name: Generate PDF
        if: steps.pdf-check.outputs.skip == 'false'
        run: npm run pdf
        env:
          PUPPETEER_EXECUTABLE_PATH: /usr/bin/google-chrome-stable

      - name: Commit PDF
        if: steps.pdf-check.outputs.skip == 'false'
        run: |
          git config user.name '${{ vars.GIT_NAME }}'
          git config user.email '${{ vars.GIT_EMAIL }}'
          git add Albert-Hilazo-Aguilera-resume.pdf
          git diff --staged --quiet || git commit -m "Automated PDF update"
          git push
